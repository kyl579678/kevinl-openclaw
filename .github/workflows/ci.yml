name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check HTML files exist
        run: |
          echo "Checking tutorial files..."
          ls -la openclaw/
          echo "Checking screenshots..."
          ls -la openclaw/screenshots/ || echo "No screenshots"
